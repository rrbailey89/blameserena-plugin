name: Build and Release BlameSerena

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Clone dalamud-distrib
      run: |
        git clone --depth 1 https://github.com/goatcorp/dalamud-distrib.git
        $dalamudDir = "$env:APPDATA\XIVLauncher\addon\Hooks\dev"
        mkdir $dalamudDir -Force
        Copy-Item -Path dalamud-distrib/api15/latest.zip -Destination latest.zip
        Expand-Archive -Path latest.zip -DestinationPath $dalamudDir -Force

    - name: Clean output folders
      run: Remove-Item -Recurse -Force BlameSerena/bin,BlameSerena/obj -ErrorAction SilentlyContinue

    - name: Build
      run: dotnet build BlameSerena/BlameSerena.csproj -c Release

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./BlameSerena/bin/Release/BlameSerena/latest.zip
        asset_name: BlameSerena.zip
        asset_content_type: application/zip
